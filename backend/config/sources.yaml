# 信息源注册表（配置数据，非代码）。字段定义见 docs/04-roadmap.md §2.1。
# M3 全部 14 条已录入并逐条用真实 HTTP 请求核实过有效（2026-07-04）。
#
# 字段说明：
#   name          kebab-case 唯一标识
#   tier          1/2/3，见 04 §2.1 分级逻辑
#   perspective   research / product / investor
#   fetch_method  rss / api / webfetch / script
#   reliability   alive / degraded / dead
#   last_verified 最近一次人工核实这个源仍然有效的日期（ISO 8601），
#                 preflight_activity 用它判断是否超过 30 天需要告警
#   url           抓取入口地址（rss=feed 地址；api=API 端点；webfetch=列表页地址；
#                 script=对应脚本抓取的入口地址，脚本内部逻辑见 backend/worker/fetch.py）
#   bias          可选，仅少数源标注（如 a16z 的 VC 视角）

sources:
