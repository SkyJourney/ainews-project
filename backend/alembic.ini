[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url 不在这里写死，由 migrations/env.py 从环境变量 DATABASE_URL 读取
# ——本机直跑（conda 环境）指向 localhost:15432，容器内跑（compose 网络）指向 db:5432，
# 两种场景连接串不同，硬编码在 ini 里会顾此失彼。

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
